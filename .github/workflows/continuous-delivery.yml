name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_deploy: ${{ steps.gate.outputs.should_deploy }}
      git_sha: ${{ steps.gate.outputs.git_sha }}
      git_ref: ${{ steps.gate.outputs.git_ref }}
    steps:
      - id: gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "git_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "git_ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event.workflow_run.conclusion }}" != "success" ]]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event.workflow_run.head_branch }}" != "main" ]]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "git_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          echo "git_ref=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"

  publish-backend-image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: prepare
    if: needs.prepare.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.git_sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - prepare
      - publish-backend-image
    if: needs.prepare.outputs.should_deploy == 'true'
    environment: production
    steps:
      - name: Trigger backend deployment
        env:
          BACKEND_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          if [[ -z "$BACKEND_DEPLOY_HOOK_URL" ]]; then
            echo "BACKEND_DEPLOY_HOOK_URL is not set. Skipping backend deploy trigger."
            exit 0
          fi

          curl --fail --silent --show-error --retry 3 --retry-all-errors --max-time 30 --request POST "$BACKEND_DEPLOY_HOOK_URL"

  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - prepare
      - publish-backend-image
    if: needs.prepare.outputs.should_deploy == 'true'
    environment: production
    steps:
      - name: Trigger frontend deployment
        env:
          FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.FRONTEND_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          if [[ -z "$FRONTEND_DEPLOY_HOOK_URL" ]]; then
            echo "FRONTEND_DEPLOY_HOOK_URL is not set. Skipping frontend deploy trigger."
            exit 0
          fi

          curl --fail --silent --show-error --retry 3 --retry-all-errors --max-time 30 --request POST "$FRONTEND_DEPLOY_HOOK_URL"
